name: Steam Deal Check

on:
  schedule:
    - cron: '0 2,10,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deal checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/steam_bot.py

      - name: Commit updated state
        run: |
          git config user.name "steam-deal-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/known_deals.json
          git diff --staged --quiet || git commit -m "update known deals [skip ci]"
          git push
